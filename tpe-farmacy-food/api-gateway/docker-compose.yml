services:
  api-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: api-gateway
    container_name: api-gateway
    depends_on:
      - discovery-service
    ports:
      - "7080:8080"
    environment:
      JAVA_OPTS: >-
        -Deureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
    networks:
      - farmacyfood-net
