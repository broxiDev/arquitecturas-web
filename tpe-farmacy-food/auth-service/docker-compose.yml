services:
  postgres-auth:
    image: postgres:16
    container_name: auth-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_DB: auth_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5439:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  auth_postgres_data:
