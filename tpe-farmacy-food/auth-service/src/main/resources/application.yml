server:
  port: 8089

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5439/auth_db
    username: root
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

audit:
  service-name: AUTH-SERVICE

springdoc:
  api-docs:
    path: /api/v1/auth/v3/api-docs

jwt:
  secret: clave.super.secreta.jwt.1234567890
  expiration-ms: 3600000
