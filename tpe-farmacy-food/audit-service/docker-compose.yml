services:
  postgres-audit:
    image: postgres:16
    container_name: audit-postgres
    environment:
      POSTGRES_DB: audit_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5438:5432"
    volumes:
      - audit_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  audit_postgres_data:
