server:
  port: 8084

spring:
  application:
    name: kitchen-service
  profiles:
    active: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/kitchen_db?TimeZone=UTC
    username: root
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

audit:
  service-name: KITCHEN-SERVICE

springdoc:
  api-docs:
    path: /api/v1/cocina-fantasma/v3/api-docs

jwt:
  secret: clave.super.secreta.jwt.1234567890