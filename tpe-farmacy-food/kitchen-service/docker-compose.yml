services:
  kitchen-postgres:
    image: postgres:16
    container_name: kitchen-postgres
    environment:
      POSTGRES_DB: kitchen_db
      POSTGRES_USER: root
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - kitchen_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  kitchen_postgres_data:
