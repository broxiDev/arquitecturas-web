services:
  postgres-user:
    image: postgres:16
    container_name: user-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_DB: user_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5435:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  user_postgres_data:
