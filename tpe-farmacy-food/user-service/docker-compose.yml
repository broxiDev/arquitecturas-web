services:
  postgres-user:
    image: postgres:16
    container_name: farmacyfood_postgres_user
    environment:
      POSTGRES_USER: farmacyfood
      POSTGRES_PASSWORD: farmacyfood
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data

volumes:
  postgres_user_data:
