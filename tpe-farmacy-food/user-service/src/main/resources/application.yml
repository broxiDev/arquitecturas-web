server:
  port: 8086

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5435/user_db
    username: root
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

audit:
  service-name: USER-SERVICE

springdoc:
  api-docs:
    path: /api/v1/usuarios/v3/api-docs

jwt:
  secret: clave.super.secreta.jwt.1234567890
