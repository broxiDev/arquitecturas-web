services:
  postgres:
    image: postgres:16
    container_name: farmacyfood_postgres
    environment:
      POSTGRES_USER: farmacyfood
      POSTGRES_PASSWORD: farmacyfood
      POSTGRES_DB: farmacyfood
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: farmacyfood_mongodb
    environment:
      MONGO_INITDB_DATABASE: farmacyfood
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
