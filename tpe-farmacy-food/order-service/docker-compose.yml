services:
  order-postgres:
    image: postgres:16
    container_name: order-postgres
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: root
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: UTC
    ports:
      - "5434:5432"
    volumes:
      - order_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - farmacyfood-net

  order-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE: order-service
    container_name: order-service
    depends_on:
      - order-postgres
    ports:
      - "7083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: >-
        -Dspring.datasource.url=jdbc:postgresql://order-postgres:5432/order_db?TimeZone=UTC
        -Deureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
        -Dclients.audit-service.url=http://audit-service:8088
    networks:
      - farmacyfood-net

volumes:
  order_postgres_data:
