version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: arquitecturas_mysql_container_i2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: integrador2_db
    ports:
      - "3310:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  db_mariadb:
    image: mariadb:10.11
    container_name: arquitecturas_mariadb_container_i2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: integrador2_db
    ports:
      - "3311:3306"
    volumes:
      - db_mariadb_data:/var/lib/mysql
      - ./init_mariadb.sql:/docker-entrypoint-initdb.d/init_mariadb.sql
volumes:
  db_data:
  db_mariadb_data:
